services:
  - type: web
    name: accountanta-api
    runtime: ruby
    buildCommand: bundle install && bundle exec rails assets:precompile
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false  # Required to decrypt credentials (contains Neon DATABASE_URL)
      - key: SECRET_KEY_BASE
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: 2
