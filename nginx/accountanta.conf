# Accountanta API — Nginx reverse proxy config
# Works with a raw Droplet IP — no domain required.
#
# Place at: /etc/nginx/sites-available/accountanta
# Enable:   sudo ln -s /etc/nginx/sites-available/accountanta /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx
#
# Base URL when using raw IP:  http://<your-droplet-ip>
# Base URL when domain added:  https://api.yourdomain.com
#
# To add HTTPS later:
#   1. Point a domain A record to this IP
#   2. Replace server_name _ with your domain
#   3. Run: sudo certbot --nginx -d api.yourdomain.com

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
    listen 80;
    server_name _;    # "_" catches any IP or hostname — works with raw DigitalOcean IP

    # Security headers (HTTP — add HSTS only after moving to HTTPS)
    add_header X-Content-Type-Options  nosniff        always;
    add_header X-Frame-Options         SAMEORIGIN     always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # Buffer / timeout tuning
    client_max_body_size    20M;
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    send_timeout            60s;

    # Auth endpoints — tighter rate limit
    location ~ ^/api/v1/auth/(login|signup|forgot_password) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # All other API + admin routes
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket passthrough (for Action Cable if used)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Health check — no rate limiting, no logging
    location = /up {
        access_log off;
        proxy_pass http://127.0.0.1:3000;
    }

    # Block dot-file access
    location ~ /\. {
        deny all;
    }
}
