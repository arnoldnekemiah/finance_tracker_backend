    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Retrieves a saving goal
      tags:
      - Saving Goals
      security:
      - bearer_auth: []
      responses:
        '200':
          description: saving goal found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  target_amount:
                    type: number
                  current_amount:
                    type: number
                  target_date:
                    type: string
                    format: date-time
                  notes:
                    type: string
        '404':
          description: saving goal not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    put:
      summary: Updates a saving goal
      tags:
      - Saving Goals
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: saving goal updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  target_amount:
                    type: number
                  current_amount:
                    type: number
                  target_date:
                    type: string
                    format: date-time
                  notes:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                saving_goal:
                  type: object
                  properties:
                    title:
                      type: string
                    target_amount:
                      type: number
                    current_amount:
                      type: number
                    target_date:
                      type: string
                      format: date-time
                    notes:
                      type: string
    delete:
      summary: Deletes a saving goal
      tags:
      - Saving Goals
      security:
      - bearer_auth: []
      responses:
        '204':
          description: saving goal deleted
  "/api/v1/saving_goals/{id}/update_progress":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Update progress of a saving goal
      tags:
      - Saving Goals
      security:
      - bearer_auth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                current_amount:
                  type: number
                  description: Direct update of current amount
                progress_amount:
                  type: number
                  description: Amount to add to current progress
      responses:
        '200':
          description: progress updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavingGoal'
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
  "/api/v1/transactions":
    get:
      summary: Lists all transactions
      tags:
      - Transactions
      security:
      - bearer_auth: []
      responses:
        '200':
          description: transactions found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        amount:
                          type: number
                        category:
                          $ref: '#/components/schemas/Category'
                        type:
                          type: string
                        date:
                          type: string
                          format: date-time
                        notes:
                          type: string
                        recurring_id:
                          type: string
                          nullable: true
                        payment_method:
                          type: string
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    post:
      summary: Creates a transaction
      tags:
      - Transactions
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: transaction created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  amount:
                    type: number
                  category:
                    type: string
                  type:
                    type: string
                  date:
                    type: string
                    format: date-time
                  notes:
                    type: string
                  recurring_id:
                    type: string
                    nullable: true
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction:
                  type: object
                  properties:
                    amount:
                      type: number
                    category_id:
                      type: integer
                    type:
                      type: string
                      enum:
                      - income
                      - expense
                    date:
                      type: string
                      format: date-time
                    notes:
                      type: string
                    recurring_id:
                      type: string
                      nullable: true
                    payment_method:
                      type: string
                  required:
                  - amount
                  - category_id
                  - type
                  - date
