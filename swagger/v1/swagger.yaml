---
openapi: 3.0.1
info:
  title: Finance Tracker API
  version: v1
  description: This is the API documentation for the Finance Tracker application.
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearer_format: JWT
  schemas:
    Money:
      type: object
      properties:
        amount:
          type: number
          example: 1500.75
        formatted:
          type: string
          example: $1,500.75
        currency_code:
          type: string
          example: USD
        currency_symbol:
          type: string
          example: $
        currency_name:
          type: string
          example: US Dollar
    Currency:
      type: object
      properties:
        code:
          type: string
          example: USD
        name:
          type: string
          example: US Dollar
        symbol:
          type: string
          example: $
    ExchangeRate:
      type: object
      properties:
        from:
          type: string
          example: USD
        to:
          type: string
          example: EUR
        rate:
          type: number
          example: 0.85
        updated_at:
          type: string
          format: date-time
          example: "2025-08-07T16:30:00Z"
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        transaction_type:
          type: string
        parent_category_id:
          type: integer
          nullable: true
          description: ID of parent category for subcategories
    Debt:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        amount:
          type: number
        creditor:
          type: string
        description:
          type: string
        due_date:
          type: string
          format: date
        status:
          type: string
          enum: [pending, paid, overdue]
        debt_type:
          type: string
          enum: [loan, credit_card, mortgage, personal, business]
        interest_rate:
          type: number
        is_recurring:
          type: boolean
        recurring_period:
          type: string
        overdue:
          type: boolean
        days_until_due:
          type: integer
    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        account_type:
          type: string
          enum: [regular, debt, savings]
        account_number:
          type: string
        bank_name:
          type: string
        balance:
          type: number
        currency:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        formatted_balance:
          type: string
        account_number_masked:
          type: string
    Budget:
      type: object
      properties:
        id:
          type: integer
        category:
          $ref: '#/components/schemas/Category'
        limit:
          type: number
        spent:
          type: number
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        period:
          type: string
        percentage_used:
          type: number
        remaining_amount:
          type: number
        over_budget:
          type: boolean
        days_remaining:
          type: integer
    SavingGoal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        target_amount:
          type: number
        current_amount:
          type: number
        target_date:
          type: string
          format: date-time
        notes:
          type: string
        progress_percentage:
          type: number
        remaining_amount:
          type: number
        achieved:
          type: boolean
        days_remaining:
          type: integer
        overdue:
          type: boolean
        monthly_savings_needed:
          type: number
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        currency:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Transaction:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        description:
          type: string
        transaction_type:
          type: string
          enum: [income, expense, transfer]
        date:
          type: string
          format: date-time
        notes:
          type: string
        payment_method:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        account:
          $ref: '#/components/schemas/Account'
        from_account_id:
          type: integer
          nullable: true
          description: Source account ID for expenses and transfers
        to_account_id:
          type: integer
          nullable: true
          description: Destination account ID for income and transfers
        from_account:
          $ref: '#/components/schemas/Account'
        to_account:
          $ref: '#/components/schemas/Account'
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
servers:
- url: http://localhost:3001
  description: Development server
- url: https://finance-tracker-backend-5djo.onrender.com
  description: Production server
paths:
  "/signup":
    post:
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    password_confirmation:
                      type: string
                    currency:
                      type: string
        required:
          - first_name
          - last_name
          - email
          - password
          - password_confirmation
          - currency
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  data:
                    type: object
                    $ref: '#/components/schemas/User'
        '422':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      message:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minimum: 6
                    password_confirmation:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
                    currency:
                      type: string
                    avatar:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
  "/login":
    post:
      summary: Login user
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: user logged in
          headers:
            Authorization:
              schema:
                type: string
              description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  data:
                    type: object
                    properties:
                      email:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                      currency:
                        type: string
                      avatar:
                        type: string
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required:
                  - email
                  - password
  "/logout":
    delete:
      summary: Logout user
      tags:
      - Authentication
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Successfully logged out
        '401':
          description: Unauthorized
  "/api/v1/password_reset":
    post:
      summary: Request password reset
      tags:
      - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
              required:
              - email
      responses:
        '200':
          description: Password reset instructions sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If an account with that email exists, password reset instructions have been sent.
                  reset_token:
                    type: string
                    description: Only returned in development mode
    patch:
      summary: Reset password with token
      tags:
      - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reset_token:
                  type: string
                  example: abc123def456
                user:
                  type: object
                  properties:
                    password:
                      type: string
                      example: newpassword123
                    password_confirmation:
                      type: string
                      example: newpassword123
                  required:
                  - password
                  - password_confirmation
              required:
              - reset_token
              - user
      responses:
        '200':
          description: Password successfully reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password has been successfully reset. You can now log in with your new password.
        '422':
          description: Invalid or expired token
  "/api/v1/dashboard":
    get:
      summary: Get dashboard data
      description: Returns comprehensive financial dashboard data including balance overview, monthly summary, spending trends, and quick stats
      tags:
      - Dashboard
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Dashboard data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Dashboard data retrieved successfully
                  data:
                    type: object
                    properties:
                      currency:
                        type: object
                        properties:
                          code:
                            type: string
                            example: USD
                          symbol:
                            type: string
                            example: $
                          name:
                            type: string
                            example: US Dollar
                      balance_overview:
                        type: object
                        properties:
                          current_balance:
                            type: object
                            properties:
                              amount:
                                type: number
                                example: 2500.75
                              formatted:
                                type: string
                                example: $2,500.75
                              currency_code:
                                type: string
                                example: USD
                              currency_symbol:
                                type: string
                                example: $
                              currency_name:
                                type: string
                                example: US Dollar
                          monthly_income:
                            type: object
                            properties:
                              amount:
                                type: number
                                example: 5000.00
                              formatted:
                                type: string
                                example: $5,000.00
                              currency_code:
                                type: string
                                example: USD
                              currency_symbol:
                                type: string
                                example: $
                              currency_name:
                                type: string
                                example: US Dollar
                          monthly_expenses:
                            type: object
                            properties:
                              amount:
                                type: number
                                example: 2200.50
                              formatted:
                                type: string
                                example: $2,200.50
                              currency_code:
                                type: string
                                example: USD
                              currency_symbol:
                                type: string
                                example: $
                              currency_name:
                                type: string
                                example: US Dollar
                          net_income:
                            type: object
                            properties:
                              amount:
                                type: number
                                example: 2799.50
                              formatted:
                                type: string
                                example: $2,799.50
                              currency_code:
                                type: string
                                example: USD
                              currency_symbol:
                                type: string
                                example: $
                              currency_name:
                                type: string
                                example: US Dollar
                      monthly_summary:
                        type: object
                        properties:
                          budget_utilization:
                            type: number
                            example: 0.44
                          income:
                            type: number
                            example: 5000.00
                          expenses:
                            type: number
                            example: 2200.50
                          savings_rate:
                            type: number
                            example: 0.56
                      weekly_spending:
                        type: object
                        properties:
                          current_week:
                            type: array
                            items:
                              type: number
                            example: [120.50, 85.30, 200.00, 45.75, 180.25, 95.40, 75.80]
                          labels:
                            type: array
                            items:
                              type: string
                            example: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
                      top_spending_categories:
                        type: array
                        items:
                          type: object
                          properties:
                            category_id:
                              type: integer
                              example: 1
                            category_name:
                              type: string
                              example: "Food & Dining"
                            amount:
                              type: number
                              example: 650.00
                            percentage:
                              type: number
                              example: 29.5
                            icon:
                              type: string
                              example: "restaurant"
                            color:
                              type: string
                              example: "#FF6B6B"
                      recent_transactions:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 123
                            amount:
                              type: number
                              example: 45.50
                            description:
                              type: string
                              example: "Coffee Shop"
                            category:
                              type: string
                              example: "Food & Dining"
                            date:
                              type: string
                              format: date-time
                              example: "2025-08-07T10:30:00Z"
                            type:
                              type: string
                              example: "expense"
                      quick_stats:
                        type: object
                        properties:
                          total_budgets:
                            type: integer
                            example: 5
                          active_debts:
                            type: integer
                            example: 2
                          saving_goals:
                            type: integer
                            example: 3
                          transactions_this_month:
                            type: integer
                            example: 47
        '401':
          description: Unauthorized
  "/api/v1/dashboard/financial_overview":
    get:
      summary: Get financial overview
      description: Returns net worth calculation with total assets and total debts
      tags:
      - Dashboard
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Financial overview retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Financial overview retrieved successfully
                  data:
                    type: object
                    properties:
                      currency:
                        $ref: '#/components/schemas/Currency'
                      total_assets:
                        $ref: '#/components/schemas/Money'
                      total_debts:
                        $ref: '#/components/schemas/Money'
                      net_worth:
                        $ref: '#/components/schemas/Money'
        '401':
          description: Unauthorized
  "/api/v1/dashboard/monthly_summary":
    get:
      summary: Get monthly summary with balances
      description: Returns monthly financial summary including starting balance, ending balance, income, and expenses for a specific month
      tags:
      - Dashboard
      security:
      - bearer_auth: []
      parameters:
      - name: month
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 12
        description: Month (1-12), defaults to current month
      - name: year
        in: query
        required: false
        schema:
          type: integer
        description: Year, defaults to current year
      responses:
        '200':
          description: Monthly summary retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Monthly summary retrieved successfully
                  data:
                    type: object
                    properties:
                      currency:
                        $ref: '#/components/schemas/Currency'
                      month:
                        type: integer
                        example: 8
                      year:
                        type: integer
                        example: 2025
                      starting_balance:
                        $ref: '#/components/schemas/Money'
                      ending_balance:
                        $ref: '#/components/schemas/Money'
                      total_income:
                        $ref: '#/components/schemas/Money'
                      total_expenses:
                        $ref: '#/components/schemas/Money'
                      net_change:
                        $ref: '#/components/schemas/Money'
        '401':
          description: Unauthorized
  "/api/v1/currencies":
    get:
      summary: Get supported currencies and exchange rates
      description: Returns list of supported currencies, user's current currency preference, and exchange rates
      tags:
      - Currencies
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Currencies retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Currencies retrieved successfully
                  data:
                    type: object
                    properties:
                      supported_currencies:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            name:
                              type: string
                              example: US Dollar
                            symbol:
                              type: string
                              example: $
                            code:
                              type: string
                              example: USD
                      user_currency:
                        type: string
                        example: USD
                      exchange_rates:
                        type: array
                        items:
                          type: object
                          properties:
                            from:
                              type: string
                              example: USD
                            to:
                              type: string
                              example: EUR
                            rate:
                              type: number
                              example: 0.85
        '401':
          description: Unauthorized
  "/api/v1/currencies/preference":
    patch:
      summary: Update user currency preference
      description: Updates the user's preferred currency for displaying financial data
      tags:
      - Currencies
      security:
      - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    preferred_currency:
                      type: string
                      example: EUR
                      enum: [USD, EUR, GBP, JPY, CAD, AUD, CHF, CNY, KES, NGN, ZAR, UGX, TZS, RWF, ETB, GHS]
                    timezone:
                      type: string
                      example: UTC
                  required:
                  - preferred_currency
              required:
              - user
      responses:
        '200':
          description: Currency preference updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Currency preference updated successfully
                  data:
                    type: object
                    properties:
                      preferred_currency:
                        type: string
                        example: EUR
                      currency_info:
                        type: object
                        properties:
                          name:
                            type: string
                            example: Euro
                          symbol:
                            type: string
                            example: €
                          code:
                            type: string
                            example: EUR
        '422':
          description: Invalid currency code
        '401':
          description: Unauthorized
  "/api/v1/currencies/exchange_rates":
    get:
      summary: Get exchange rates
      description: Get current exchange rates from base currency to target currencies
      tags:
      - Currencies
      security:
      - bearer_auth: []
      parameters:
      - name: from
        in: query
        description: Base currency code (defaults to user's preferred currency)
        required: false
        schema:
          type: string
          example: USD
      - name: to
        in: query
        description: Comma-separated list of target currency codes
        required: false
        schema:
          type: string
          example: EUR,GBP,JPY
      responses:
        '200':
          description: Exchange rates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: Exchange rates retrieved successfully
                  data:
                    type: object
                    properties:
                      base_currency:
                        type: string
                        example: USD
                      rates:
                        type: array
                        items:
                          type: object
                          properties:
                            from:
                              type: string
                              example: USD
                            to:
                              type: string
                              example: EUR
                            rate:
                              type: number
                              example: 0.85
                            updated_at:
                              type: string
                              format: date-time
                              example: "2025-08-07T16:30:00Z"
        '401':
          description: Unauthorized
  "/api/v1/budgets":
    get:
      summary: Lists all budgets with pagination and calculated fields
      description: Returns paginated list of budgets with calculated fields like percentage used, remaining amount, over budget status, and days remaining. Includes complete category details.
      tags:
      - Budgets
      security:
      - bearer_auth: []
      parameters:
      - name: page
        in: query
        description: Page number for pagination
        required: false
        schema:
          type: integer
          default: 1
      - name: per_page
        in: query
        description: Number of items per page (max 100)
        required: false
        schema:
          type: integer
          default: 20
          maximum: 100
      responses:
        '200':
          description: Budgets retrieved successfully with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique budget identifier
                          example: 1
                        category:
                          type: object
                          description: Complete category information
                          properties:
                            id:
                              type: integer
                              example: 3
                            name:
                              type: string
                              example: "Food & Dining"
                            icon:
                              type: string
                              example: "restaurant"
                            color:
                              type: string
                              example: "#FF6B6B"
                            transaction_type:
                              type: string
                              example: "expense"
                        limit:
                          type: string
                          description: Budget limit amount
                          example: "500.0"
                        spent:
                          type: string
                          description: Amount spent so far
                          example: "320.50"
                        start_date:
                          type: string
                          format: date-time
                          description: Budget start date
                          example: "2025-08-01T00:00:00.000Z"
                        end_date:
                          type: string
                          format: date-time
                          description: Budget end date
                          example: "2025-08-31T00:00:00.000Z"
                        period:
                          type: string
                          description: Budget period
                          example: "monthly"
                          enum: [weekly, monthly, yearly]
                        percentage_used:
                          type: string
                          description: Percentage of budget used (calculated field)
                          example: "64.1"
                        remaining_amount:
                          type: string
                          description: Remaining budget amount (calculated field)
                          example: "179.50"
                        over_budget:
                          type: boolean
                          description: Whether budget is exceeded (calculated field)
                          example: false
                        days_remaining:
                          type: integer
                          description: Days remaining in budget period (calculated field)
                          example: 19
                  pagination:
                    type: object
                    description: Pagination metadata
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      total_pages:
                        type: integer
                        example: 3
                      total_count:
                        type: integer
                        example: 45
                      per_page:
                        type: integer
                        example: 20
        '401':
          description: Unauthorized - Invalid or missing JWT token
        '500':
          description: Internal server error
    post:
      summary: Creates a new budget
      description: Creates a new budget with automatic calculation of derived fields
      tags:
      - Budgets
      security:
      - bearer_auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                budget:
                  type: object
                  properties:
                    category_id:
                      type: integer
                      description: ID of the category for this budget
                      example: 3
                    limit:
                      type: number
                      description: Budget limit amount
                      example: 500.00
                    start_date:
                      type: string
                      format: date-time
                      description: Budget start date
