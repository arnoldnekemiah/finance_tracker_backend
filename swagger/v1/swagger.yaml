---
openapi: 3.0.1
info:
  title: Finance Tracker API
  version: v1
  description: This is the API documentation for the Finance Tracker application.
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearer_format: JWT
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        color:
          type: string
        transaction_type:
          type: string
    Debt:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        amount:
          type: number
        creditor:
          type: string
        description:
          type: string
        due_date:
          type: string
          format: date
        status:
          type: string
          enum: [pending, paid, overdue]
        debt_type:
          type: string
          enum: [loan, credit_card, mortgage, personal, business]
        interest_rate:
          type: number
        is_recurring:
          type: boolean
        recurring_period:
          type: string
        overdue:
          type: boolean
        days_until_due:
          type: integer
    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        account_type:
          type: string
          enum: [bank, mobile_money, savings, checking, credit]
        account_number:
          type: string
        bank_name:
          type: string
        balance:
          type: number
        currency:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        formatted_balance:
          type: string
        account_number_masked:
          type: string
    Budget:
      type: object
      properties:
        id:
          type: integer
        category:
          $ref: '#/components/schemas/Category'
        limit:
          type: number
        spent:
          type: number
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        period:
          type: string
        percentage_used:
          type: number
        remaining_amount:
          type: number
        over_budget:
          type: boolean
        days_remaining:
          type: integer
    SavingGoal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        target_amount:
          type: number
        current_amount:
          type: number
        target_date:
          type: string
          format: date-time
        notes:
          type: string
        progress_percentage:
          type: number
        remaining_amount:
          type: number
        achieved:
          type: boolean
        days_remaining:
          type: integer
        overdue:
          type: boolean
        monthly_savings_needed:
          type: number
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        currency:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Transaction:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        description:
          type: string
        transaction_type:
          type: string
          enum: [income, expense]
        date:
          type: string
          format: date-time
        notes:
          type: string
        payment_method:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        account:
          $ref: '#/components/schemas/Account'
        user_id:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
servers:
- url: http://localhost:3001
  description: Development server
paths:
  "/signup":
    post:
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    password_confirmation:
                      type: string
                    currency:
                      type: string
        required:
          - first_name
          - last_name
          - email
          - password
          - password_confirmation
          - currency
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  data:
                    type: object
                    $ref: '#/components/schemas/User'
        '422':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      message:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minimum: 6
                    password_confirmation:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
                    currency:
                      type: string
                    avatar:
                      type: string
                  required:
                  - email
                  - password
                  - password_confirmation
  "/login":
    post:
      summary: Login user
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: user logged in
          headers:
            Authorization:
              schema:
                type: string
              description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
                  data:
                    type: object
                    properties:
                      email:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                      currency:
                        type: string
                      avatar:
                        type: string
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required:
                  - email
                  - password
  "/logout":
    delete:
      summary: Logout user
      tags:
      - Authentication
      security:
      - bearer_auth: []
      responses:
        '200':
          description: logged out successfully
