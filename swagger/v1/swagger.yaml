                        remaining_amount:
                          type: number
                        percentage_used:
                          type: number
                        is_over_budget:
                          type: boolean
                        period:
                          type: string
    post:
      summary: Creates a budget
      tags:
      - Budgets
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: budget created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  category:
                    type: string
                  limit:
                    type: number
                  spent:
                    type: number
                  start_date:
                    type: string
                    format: date-time
                  end_date:
                    type: string
                    format: date-time
        '422':
          description: invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                budget:
                  type: object
                  properties:
                    category_id:
                      type: integer
                    limit:
                      type: number
                    spent:
                      type: number
                    start_date:
                      type: string
                      format: date-time
                    end_date:
