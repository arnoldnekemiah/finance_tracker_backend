---
openapi: 3.0.1
info:
  title: Accountanta Finance Tracker API
  version: v1
  description: RESTful API for the Accountanta personal finance tracking application.
    Manage accounts, transactions, budgets, debts, saving goals, and more.
  contact:
    name: API Support
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/auth/login or /api/v1/auth/signup
  schemas:
    error_response:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: Error message
    success_response:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
    user:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        currency:
          type: string
          example: USD
        preferred_currency:
          type: string
          example: USD
        timezone:
          type: string
          example: UTC
        photo_url:
          type: string
          nullable: true
        is_admin:
          type: boolean
        is_active:
          type: boolean
        provider:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        account_type:
          type: string
        bank_name:
          type: string
          nullable: true
        balance:
          type: string
          example: '1000.00'
        currency:
          type: string
          example: USD
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        account_number_masked:
          type: string
          nullable: true
        formatted_balance:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        transaction_type:
          type: string
          enum:
          - income
          - expense
    transaction:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: string
        original_amount:
          type: string
          nullable: true
        original_currency:
          type: string
          example: USD
        transaction_type:
          type: string
          enum:
          - income
          - expense
          - transfer
        category_id:
          type: integer
          nullable: true
        category_name:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        description:
          type: string
          nullable: true
        from_account_id:
          type: integer
          nullable: true
        to_account_id:
          type: integer
          nullable: true
        payment_method:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    budget:
      type: object
      properties:
        id:
          type: integer
        category:
          "$ref": "#/components/schemas/category"
        limit:
          type: string
        spent:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        period:
          type: string
        percentage_used:
          type: number
        remaining_amount:
          type: string
        over_budget:
          type: boolean
        days_remaining:
          type: integer
    debt:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        amount:
          type: string
        creditor:
          type: string
        description:
          type: string
          nullable: true
        due_date:
          type: string
          format: date
        status:
          type: string
          enum:
          - pending
          - paid
          - overdue
        debt_type:
          type: string
        interest_rate:
          type: string
          nullable: true
        is_recurring:
          type: boolean
        recurring_period:
          type: string
          nullable: true
        overdue:
          type: boolean
        days_until_due:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    saving_goal:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        target_amount:
          type: string
        current_amount:
          type: string
        target_date:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
        progress_percentage:
          type: number
        remaining_amount:
          type: string
        achieved:
          type: boolean
        days_remaining:
          type: integer
        overdue:
          type: boolean
        monthly_savings_needed:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    support_message:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        display_name:
          type: string
        message_type:
          type: string
        message:
          type: string
        status:
          type: string
        app_version:
          type: string
          nullable: true
        build_number:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    pagination:
      type: object
      properties:
        current_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer
        per_page:
          type: integer
servers:
- url: http://localhost:3000
  description: Local development
- url: https://accountanta-api.onrender.com
  description: Production (Render)
paths:
  "/api/v1/accounts":
    get:
      summary: List all active accounts
      tags:
      - Accounts
      operationId: listAccounts
      security:
      - bearer_auth: []
      responses:
        '200':
          description: List of active accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/account"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    post:
      summary: Create a new account
      tags:
      - Accounts
      operationId: createAccount
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/account"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Checking Account
                account_type:
                  type: string
                  example: checking
                  description: e.g. checking, savings, credit_card, cash, investment
                bank_name:
                  type: string
                  example: Chase Bank
                balance:
                  type: number
                  example: 1000.0
                currency:
                  type: string
                  example: USD
                account_number:
                  type: string
                  example: "****1234"
                is_active:
                  type: boolean
                  example: true
              required:
              - name
              - account_type
  "/api/v1/accounts/{id}":
    parameters:
    - name: id
      in: path
      description: Account ID
      required: true
      schema:
        type: integer
    get:
      summary: Get account details
      tags:
      - Accounts
      operationId: getAccount
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/account"
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    put:
      summary: Update an account
      tags:
      - Accounts
      operationId: updateAccount
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/account"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                account_type:
                  type: string
                bank_name:
                  type: string
                balance:
                  type: number
                currency:
                  type: string
                account_number:
                  type: string
                is_active:
                  type: boolean
    delete:
      summary: Delete (deactivate) an account
      tags:
      - Accounts
      operationId: deleteAccount
      security:
      - bearer_auth: []
      responses:
        '204':
          description: Account deactivated
        '404':
          description: Account not found
  "/api/v1/auth/signup":
    post:
      summary: Create a new user account
      tags:
      - Authentication
      operationId: signup
      parameters: []
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        "$ref": "#/components/schemas/user"
                      token:
                        type: string
                        description: JWT authentication token
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: Password123!
                password_confirmation:
                  type: string
                  example: Password123!
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
                currency:
                  type: string
                  example: USD
              required:
              - email
              - password
              - password_confirmation
              - first_name
              - last_name
  "/api/v1/auth/login":
    post:
      summary: Sign in with email and password
      tags:
      - Authentication
      operationId: login
      parameters: []
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        "$ref": "#/components/schemas/user"
                      token:
                        type: string
                        description: JWT authentication token
        '401':
          description: Invalid credentials or deactivated account
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: Password123!
              required:
              - email
              - password
  "/api/v1/auth/google":
    post:
      summary: Authenticate via Google OAuth
      tags:
      - Authentication
      operationId: googleAuth
      parameters: []
      responses:
        '200':
          description: Google authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        "$ref": "#/components/schemas/user"
                      token:
                        type: string
        '422':
          description: Google authentication failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                first_name:
                  type: string
                last_name:
                  type: string
                uid:
                  type: string
                  description: Google user ID
                photo_url:
                  type: string
                  nullable: true
              required:
              - email
              - uid
  "/api/v1/auth/logout":
    delete:
      summary: Sign out and invalidate JWT token
      tags:
      - Authentication
      operationId: logout
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Logged out successfully
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
  "/api/v1/auth/me":
    get:
      summary: Get current authenticated user profile
      tags:
      - Authentication
      operationId: getCurrentUser
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/user"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
  "/api/v1/auth/forgot_password":
    post:
      summary: Request password reset OTP via email
      tags:
      - Authentication
      operationId: forgotPassword
      parameters: []
      responses:
        '200':
          description: OTP sent (always returns success for security)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: If an account exists with that email, a reset code
                          has been sent.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
              required:
              - email
  "/api/v1/auth/verify_otp":
    post:
      summary: Verify the password reset OTP
      tags:
      - Authentication
      operationId: verifyOtp
      parameters: []
      responses:
        '200':
          description: OTP verified, reset token returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                      reset_token:
                        type: string
                        description: JWT token to use for password reset
        '422':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  description: 6-digit OTP code
              required:
              - email
              - otp
  "/api/v1/auth/reset_password":
    post:
      summary: Reset password using reset token
      tags:
      - Authentication
      operationId: resetPassword
      parameters: []
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Password has been reset successfully
        '422':
          description: Reset failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Reset token from verify_otp
                password:
                  type: string
                  example: NewPassword123!
                password_confirmation:
                  type: string
                  example: NewPassword123!
              required:
              - token
              - password
              - password_confirmation
  "/api/v1/budgets":
    get:
      summary: List all budgets (paginated)
      tags:
      - Budgets
      operationId: listBudgets
      security:
      - bearer_auth: []
      parameters:
      - name: page
        in: query
        required: false
        description: 'Page number (default: 1)'
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: 'Items per page (default: 20)'
        schema:
          type: integer
      responses:
        '200':
          description: Paginated list of budgets
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/budget"
                  pagination:
                    "$ref": "#/components/schemas/pagination"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    post:
      summary: Create a new budget
      tags:
      - Budgets
      operationId: createBudget
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: Budget created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/budget"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id:
                  type: integer
                  example: 1
                limit:
                  type: number
                  example: 500.0
                  description: Budget limit amount
                spent:
                  type: number
                  example: 0.0
                start_date:
                  type: string
                  format: date-time
                  example: '2026-03-01T00:00:00Z'
                end_date:
                  type: string
                  format: date-time
                  example: '2026-03-31T23:59:59Z'
                period:
                  type: string
                  example: monthly
                  description: e.g. weekly, monthly, yearly
              required:
              - category_id
              - limit
              - start_date
              - end_date
  "/api/v1/budgets/{id}":
    parameters:
    - name: id
      in: path
      description: Budget ID
      required: true
      schema:
        type: integer
    get:
      summary: Get budget details
      tags:
      - Budgets
      operationId: getBudget
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Budget details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/budget"
        '404':
          description: Budget not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    put:
      summary: Update a budget
      tags:
      - Budgets
      operationId: updateBudget
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: Budget updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/budget"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id:
                  type: integer
                limit:
                  type: number
                spent:
                  type: number
                start_date:
                  type: string
                  format: date-time
                end_date:
                  type: string
                  format: date-time
                period:
                  type: string
    delete:
      summary: Delete a budget
      tags:
      - Budgets
      operationId: deleteBudget
      security:
      - bearer_auth: []
      responses:
        '204':
          description: Budget deleted
        '404':
          description: Budget not found
  "/api/v1/budgets/active":
    get:
      summary: List currently active budgets
      tags:
      - Budgets
      operationId: getActiveBudgets
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Active budgets
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/budget"
  "/api/v1/budgets/summary":
    get:
      summary: Get overall budget summary
      tags:
      - Budgets
      operationId: getBudgetSummary
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Budget summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      total_budget:
                        type: number
                      total_spent:
                        type: number
                      total_remaining:
                        type: number
                      budget_count:
                        type: integer
                      over_budget_count:
                        type: integer
                      budgets:
                        type: array
                        items:
                          "$ref": "#/components/schemas/budget"
  "/api/v1/categories":
    get:
      summary: List all categories
      tags:
      - Categories
      operationId: listCategories
      security:
      - bearer_auth: []
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/category"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    post:
      summary: Create a new category
      tags:
      - Categories
      operationId: createCategory
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    "$ref": "#/components/schemas/category"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Groceries
                icon:
                  type: string
                  example: "\U0001F6D2"
                color:
                  type: string
                  example: "#4CAF50"
                transaction_type:
                  type: string
                  enum:
                  - income
                  - expense
                  example: expense
                parent_category_id:
                  type: integer
                  nullable: true
                  description: ID of parent category for sub-categories
              required:
              - name
              - transaction_type
  "/api/v1/categories/{id}":
    parameters:
    - name: id
      in: path
      description: Category ID
      required: true
      schema:
        type: integer
    get:
      summary: Get category details
      tags:
      - Categories
      operationId: getCategory
      security:
      - bearer_auth: []
      responses:
        '200':
