# Database is hosted on Neon — no local postgres service needed.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: accountanta-api:latest
    container_name: accountanta_app
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"    # only expose to localhost; Nginx proxies publicly
    volumes:
      - rails_storage:/rails/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  rails_storage:
